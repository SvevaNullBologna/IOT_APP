<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Atlas Dashboard</title>

    <link rel="stylesheet" href="styles/colors.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/tabs_style.css">
    <link rel="stylesheet" href="styles/list_display_style.css">
    <link rel="stylesheet" href="styles/app_editor.css">
    <link rel="stylesheet" href="styles/connection_modal.css">
    <link rel="stylesheet" href="styles/app_card.css">
</head>

<body>

    <div class="app-shell">

        <!-- HEADER -->
        <header class="app-header">
            <div>
                <h1>Atlas Dashboard</h1>
                <p>IoT Relationship Management Platform</p>
            </div>
        </header>

        <!-- TABS -->
        <div class="tabs-container">

            <div class="tabs-bar">

                <input type="radio" name="option" id="things_tab" checked />

                <label for="things_tab">
                    <div class="tab-name">Things</div>
                </label>


                <input type="radio" name="option" id="services_tab" />

                <label for="services_tab">
                    <div class="tab-name">Services</div>
                </label>


                <input type="radio" name="option" id="relationships_tab" />

                <label for="relationships_tab">
                    <div class="tab-name">Relationships</div>
                </label>


                <input type="radio" name="option" id="apps_tab" />

                <label for="apps_tab">
                    <div class="tab-name">Apps</div>
                </label>

            </div>

            <!-- CONTENT -->
            <div id="main-content-area" class="tab-content"></div>

        </div>

    </div>

    <!-- SOCKET -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <!-- GLOBAL -->
    <script src="scripts/display.js"></script>
    <script type="module" src="connection/app.js"></script>

    <!-- TABS -->
    <script src="tabs/things/things.js"></script>
    <script src="tabs/services/services.js"></script>
    <script src="tabs/relationships/relationships.js"></script>

    <script src="tabs/apps/app_manager.js"></script>
    <script src="tabs/apps/app_editor.js"></script>
    <script src="tabs/apps/display_apps.js"></script>

    <script>

        const tabMap = {

            "things_tab": {
                file: "tabs/things/things.html",
                init: initThingsTab,
                cleanup: cleanupThingsTab
            },

            "services_tab": {
                file: "tabs/services/services.html",
                init: initServicesTab,
                cleanup: cleanupServicesTab
            },

            "relationships_tab": {
                file: "tabs/relationships/relationships.html",
                init: initRelationshipsTab,
                cleanup: cleanupRelationshipsTab
            },

            "apps_tab": {
                file: "tabs/apps/apps.html",
                init: initAppsTab,
                cleanup: cleanupAppsTab
            }
        };

        let currentCleanup = null;

        async function loadTab(tabId) {

            const tabData = tabMap[tabId];

            if (!tabData) return;

            const container =
                document.getElementById("main-content-area");

            // CLEANUP PREVIOUS TAB
            if (currentCleanup) {
                currentCleanup();
                currentCleanup = null;
            }

            try {

                const response =
                    await fetch(tabData.file);

                const html =
                    await response.text();

                container.innerHTML = html;

                if (tabData.init) {
                    tabData.init();
                }

                currentCleanup = tabData.cleanup;

            }
            catch (err) {

                container.innerHTML = `
                    <p style="color:red">
                        ${err.message}
                    </p>
                `;
            }
        }

        // TAB EVENT LISTENERS
        document
            .querySelectorAll('input[name="option"]')
            .forEach(tab => {

                tab.addEventListener("change", (e) => {

                    loadTab(e.target.id);

                });
            });

        // INITIAL LOAD
        window.onload = () => {

            loadTab("things_tab");

        };

        // GLOBAL DRAG START
        window.onServiceDragStart = (e) => {

            const payload =
                e.currentTarget.getAttribute('data-service');

            e.dataTransfer.setData(
                "text/plain",
                payload
            );

            e.dataTransfer.effectAllowed = "copy";
        };

    </script>

</body>

</html>
