<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="styles/colors.css">
        <link rel="stylesheet" href="styles/tabs_style.css">
         <link rel="stylesheet" href="styles/list_display_style.css">
    </head>
    <body>
        <div class="tabs-container">
            <input type="radio" name="option" id="things_tab" onclick="loadTab('tabs/things/things.html')" checked/>
            <label for="things_tab">
                <div class="tab-name"> Things </div>
            </label>
            <input type="radio" name="option" id="services_tab"  onclick="loadTab('tabs/services/services.html')" />
            <label for="services_tab">
                <div class="tab-name"> Services </div>
            </label>
            <input type="radio" name="option" id="relationships_tab" onclick="loadTab('tabs/relationships/relationships.html')"/>
            <label for="relationships_tab">
                <div class="tab-name"> Relationships </div>
            </label>
            <input type="radio" name="option" id="apps_tab" onclick="loadTab('tabs/apps/apps.html')"/>
            <label for="apps_tab">
                <div class="tab-name"> Apps </div>
            </label>

            <div id="main-content-area" class="tab-content"></div>
        </div>

        <script src="scripts/display.js"></script>
        <script src="tabs/things/things.js"></script>
        <script src="tabs/services/services.js"></script>
        <script src="tabs/apps/apps.js"></script>
        <script src="tabs/relationships/relationships.js"></script>

        <script>
        
            const tabMap = {
                "tabs/things/things.html": {
                    init: initThingsTab,
                    cleanup: cleanupThingsTab
                },
                "tabs/services/services.html": {
                    init: initServicesTab,
                    cleanup: cleanupServicesTab
                },
                "tabs/relationships/relationships.html": {
                    init: initRelationshipsTab,
                    cleanup: cleanupRelationshipsTab
                },
                "tabs/apps/apps.html": {
                    init: initAppsTab,
                    cleanup: cleanupAppsTab
                }
            };

            let currentCleanup = null;

            function loadTab(file) {
                const container = document.getElementById('main-content-area');

                // cleanup previous tab
                if (currentCleanup) {
                    currentCleanup();
                    currentCleanup = null;
                }

                fetch(file)
                    .then(r => r.text())
                    .then(data => {
                        container.innerHTML = data;

                        if (tabMap[file]) {
                            tabMap[file].init();
                            currentCleanup = tabMap[file].cleanup;
                        }
                    })
                    .catch(err => {
                        container.innerHTML = `<p style="color:red">${err.message}</p>`;
                    });
            }

            // initial load
            window.onload = () => loadTab('tabs/things/things.html');
        </script>

        
    
    </body>
</html>
