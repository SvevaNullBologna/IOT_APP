<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="styles/colors.css">
        <link rel="stylesheet" href="styles/tabs_style.css">
         <link rel="stylesheet" href="styles/list_display_style.css">
    </head>
    <body>
        <div class="tabs-container">
            <input type="radio" name="option" id="things_tab" onclick="loadTab('tabs/things.html')" checked/>
            <label for="things_tab">
                <div class="tab-name"> Things </div>
            </label>
            <input type="radio" name="option" id="services_tab"  onclick="loadTab('tabs/services.html')" />
            <label for="services_tab">
                <div class="tab-name"> Services </div>
            </label>
            <input type="radio" name="option" id="relationships_tab" onclick="loadTab('tabs/relationships.html')"/>
            <label for="relationships_tab">
                <div class="tab-name"> Relationships </div>
            </label>
            <input type="radio" name="option" id="apps_tab" onclick="loadTab('tabs/apps.html')"/>
            <label for="apps_tab">
                <div class="tab-name"> Apps </div>
            </label>

            <div id="main-content-area" class="tab-content"></div>
        </div>

        <script> 
            function loadTab(file) {
                const container = document.getElementById('main-content-area');

                fetch(file)
                    .then(response => {
                        if (!response.ok) throw new Error("Page not found");
                        return response.text();
                    })
                    .then(data => {
                        container.innerHTML = data;
                        container.style.opacity = "1";
                    })
                    .catch(err => {
                        container.innerHTML = `<p style="color: red;">Error: ${err.message}</p>`;
                    });
                }

                window.onload = () => loadTab('tabs/things.html');

            
            
        </script>

        <script src="scripts/display.js"></script>
        <script src="scripts/discovery.js"></script>
        <script src="scripts/relationships.js"></script>
        
    </body>
</html>
