<div class="apps-container">

    <!-- LEFT SIDE -->
    <div class="apps-sidebar">

        <button id="new-app-btn">
            New App
        </button>

        <h3>Saved Apps</h3>

        <div id="saved-apps-list"></div>

    </div>

    <!-- CENTER -->
    <div class="app-editor-container">

        <input
            id="app-name"
            placeholder="App Name"
        />

        <!-- APP EDITOR -->
        <div id="app-editor">
            <p>Drag services here...</p>
        </div>

        <!-- BUTTONS -->
        <div class="editor-buttons">

            <button id="save-app-btn">
                Save
            </button>

            <button id="finalize-app-btn">
                Finalize
            </button>

            <button id="clear-app-btn">
                Clear
            </button>

        </div>

        <!-- RELATIONSHIP BUTTONS -->
        <div class="relationship-buttons">

            <button id="add-order-btn">
                Add Order Relationship
            </button>

            <button id="add-condition-btn">
                Add Condition Relationship
            </button>

        </div>

    </div>

</div>

<!-- STATUS PANEL -->
<div id="status-panel"></div>
